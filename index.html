<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>소아과 병원 지도</title>
<script src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=czge8myept"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Apple SD Gothic Neo','맑은 고딕',sans-serif; background:#fff; overflow:hidden; }

  /* ── HEADER ── */
  header {
    position:fixed; top:0; left:0; right:0; z-index:200;
    background:white; height:52px;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 16px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
  }
  .logo { display:flex; align-items:center; gap:7px; font-size:15px; font-weight:800; color:#1a1a2e; }
  .nb { background:#03C75A; color:white; font-size:11px; font-weight:800; padding:2px 7px; border-radius:5px; }
  .count-badge { background:#03C75A; color:white; padding:3px 11px; border-radius:20px; font-size:12px; font-weight:700; }

  /* ── MAP ── */
  #map {
    position:fixed;
    top:52px; left:0; right:0; bottom:0;
  }

  /* ── MOBILE 필터바 ── */
  #filter-bar {
    position:fixed; top:52px; left:0; right:0; z-index:150;
    background:rgba(255,255,255,0.96);
    backdrop-filter:blur(8px);
    padding:8px 12px;
    display:flex; gap:6px; overflow-x:auto;
    box-shadow:0 2px 6px rgba(0,0,0,0.08);
    -webkit-overflow-scrolling:touch;
  }
  #filter-bar::-webkit-scrollbar { display:none; }
  .filter-btn {
    flex-shrink:0; padding:5px 12px; border-radius:20px;
    font-size:12px; font-weight:700; border:none; cursor:pointer;
    transition:all 0.15s; background:#f0f0f0; color:#666;
    white-space:nowrap;
  }

  /* ── FAB ── */
  #search-fab {
    position:fixed; bottom:24px; right:16px; z-index:150;
    width:52px; height:52px; border-radius:50%;
    background:#03C75A; color:white; border:none; cursor:pointer;
    font-size:22px; box-shadow:0 4px 16px rgba(3,199,90,0.45);
    display:flex; align-items:center; justify-content:center;
    transition:transform 0.15s;
  }
  #search-fab:active { transform:scale(0.93); }

  /* ── BOTTOM SHEET ── */
  #bottom-sheet {
    position:fixed; left:0; right:0; bottom:0; z-index:300;
    background:white; border-radius:20px 20px 0 0;
    box-shadow:0 -4px 24px rgba(0,0,0,0.15);
    transform:translateY(100%);
    transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);
    max-height:78vh;
    display:flex; flex-direction:column;
  }
  #bottom-sheet.open { transform:translateY(0); }
  .sheet-handle { width:40px; height:4px; background:#ddd; border-radius:2px; margin:12px auto 4px; flex-shrink:0; }

  /* 시트 내 필터 */
  .sheet-filter {
    padding:6px 12px 10px; border-bottom:1px solid #f2f2f2;
    display:flex; gap:5px; overflow-x:auto; flex-shrink:0;
    -webkit-overflow-scrolling:touch;
  }
  .sheet-filter::-webkit-scrollbar { display:none; }
  .sf-btn {
    flex-shrink:0; padding:4px 10px; border-radius:20px;
    font-size:11px; font-weight:700; border:none; cursor:pointer;
    background:#f0f0f0; color:#666; white-space:nowrap;
    transition:all 0.15s;
  }

  .sheet-search {
    padding:10px 14px 8px; display:flex; align-items:center; gap:8px; flex-shrink:0;
  }
  .sheet-search input {
    flex:1; padding:9px 14px; border:1.5px solid #e0e0e0; border-radius:10px;
    font-size:14px; outline:none;
  }
  .sheet-search input:focus { border-color:#03C75A; }
  .sheet-close {
    width:36px; height:36px; border-radius:50%; border:none;
    background:#f4f4f4; color:#666; font-size:16px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .sheet-count { padding:0 16px 8px; font-size:12px; color:#aaa; font-weight:600; flex-shrink:0; }

  .sheet-list { overflow-y:auto; padding:0 8px 32px; flex:1; -webkit-overflow-scrolling:touch; }
  .hospital-item {
    padding:11px 12px; border-radius:10px; cursor:pointer;
    margin-bottom:3px; transition:background 0.12s; border-left:3px solid transparent;
  }
  .hospital-item:active { background:#f5fdf8; }
  .hospital-item.active { background:#ebfaf2; border-left-color:#03C75A; }
  .h-row { display:flex; align-items:center; gap:7px; margin-bottom:3px; }
  .h-tag { font-size:10px; font-weight:700; color:white; padding:2px 7px; border-radius:8px; flex-shrink:0; }
  .h-name { font-size:14px; font-weight:700; color:#1a1a2e; }
  .h-addr { font-size:11px; color:#bbb; padding-left:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  /* ── OVERLAY ── */
  #overlay {
    display:none; position:fixed; inset:0; z-index:250;
    background:rgba(0,0,0,0.3);
  }
  #overlay.show { display:block; }

  /* ── INFO POPUP ── */
  .info-wrap {
    background:white; border-radius:14px; padding:14px 16px;
    min-width:200px; max-width:260px;
    box-shadow:0 8px 28px rgba(0,0,0,0.18); border-top:4px solid #03C75A;
    margin-bottom:8px; position:relative;
  }
  .info-region { font-size:10px; font-weight:800; color:white; padding:2px 8px; border-radius:8px; display:inline-block; margin-bottom:6px; }
  .info-name { font-size:14px; font-weight:800; color:#1a1a2e; margin-bottom:4px; line-height:1.3; }
  .info-addr { font-size:11px; color:#777; line-height:1.5; }
  .info-close { position:absolute; top:10px; right:12px; font-size:16px; color:#ccc; cursor:pointer; padding:4px; }

  /* ── DESKTOP ── */
  @media (min-width: 768px) {
    #map { left:300px; }
    #filter-bar { display:none; }
    #search-fab { display:none; }
    #overlay { display:none !important; }
    #bottom-sheet {
      position:fixed; left:0; top:52px; bottom:0; width:300px;
      border-radius:0; transform:none !important;
      box-shadow:2px 0 8px rgba(0,0,0,0.06); max-height:none;
    }
    .sheet-handle { display:none; }
    .sheet-close { display:none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo"><span class="nb">N</span> 소아과 병원 지도</div>
  <span class="count-badge" id="visible-count">210개 병원</span>
</header>

<!-- 모바일 상단 필터바 -->
<div id="filter-bar"></div>

<div id="map"></div>
<button id="search-fab" onclick="openSheet()">🔍</button>
<div id="overlay" onclick="closeSheet()"></div>

<!-- 바텀시트 / 사이드바 -->
<div id="bottom-sheet">
  <div class="sheet-handle"></div>

  <!-- 시트 내 지역 필터 -->
  <div class="sheet-filter" id="sheet-filter"></div>

  <!-- 검색 -->
  <div class="sheet-search">

555408}, {"name": "튼튼소아과의원", "address": "제주 제주시 과원북4길 35 늘푸른빌딩 3층", "region": "제주", "lat": 33.497421, "lng": 126.533411}];
const REGION_COLORS = {"서울": "#FF6B6B", "경기": "#FF9F43", "인천": "#F9CA24", "강원": "#22A6B3", "충북": "#6AB04C", "충남": "#00B894", "전북": "#4ECDC4", "전남": "#5F27CD", "경북": "#E17055", "경남": "#74B9FF", "대구": "#D63031", "부산": "#0984E3", "울산": "#8C7AE6", "대전": "#E84393", "광주": "#009432", "세종": "#B53471", "제주": "#00CEC9"};
const ALL_REGIONS = ["서울", "경기", "인천", "강원", "충북", "충남", "전북", "전남", "경북", "경남", "대구", "부산", "대전", "광주", "세종", "제주"];

let map, infoWindow;
let markers = [];
let activeRegion = '전체';
let searchKw = '';
let activeItem = null;

window.onload = function() {
  map = new naver.maps.Map('map', {
    center: new naver.maps.LatLng(36.5, 127.8),
    zoom: 7,
    zoomControl: true,
    zoomControlOptions: { position: naver.maps.Position.RIGHT_CENTER }
  });

  infoWindow = new naver.maps.InfoWindow({
    borderWidth:0, disableAnchor:false,
    backgroundColor:'transparent',
    pixelOffset: new naver.maps.Point(0, -8)
  });

  naver.maps.Event.addListener(map, 'click', closeInfo);

  buildFilters();
  createAllMarkers();
  renderList();

  if (window.innerWidth >= 768) {
    document.getElementById('bottom-sheet').classList.add('open');
  }
};

// ── 필터 버튼 생성 (상단바 + 시트 내부 동기화) ──
function buildFilters() {
  const topBar = document.getElementById('filter-bar');
  const sheetBar = document.getElementById('sheet-filter');
  const regions = ['전체', ...ALL_REGIONS];

  regions.forEach(r => {
    // 상단바 버튼
    const t = document.createElement('button');
    t.className = 'filter-btn'; t.dataset.region = r; t.textContent = r;
    setFilterStyle(t, r === '전체');
    t.onclick = () => setRegion(r);
    topBar.appendChild(t);

    // 시트 내 버튼
    const s = document.createElement('button');
    s.className = 'sf-btn'; s.dataset.region = r; s.textContent = r;
    setFilterStyle(s, r === '전체');
    s.onclick = () => setRegion(r);
    sheetBar.appendChild(s);
  });
}

function setFilterStyle(btn, active) {
  const r = btn.dataset.region;
  if (active) {
    btn.style.background = r === '전체' ? '#03C75A' : REGION_COLORS[r];
    btn.style.color = 'white';
  } else {
    btn.style.background = r === '전체' ? '#f0f0f0' : (REGION_COLORS[r] + '28');
    btn.style.color = '#666';
  }
}

function setRegion(region) {
  activeRegion = region;
  closeInfo();

  // 상단바 + 시트 버튼 모두 업데이트
  document.querySelectorAll('.filter-btn, .sf-btn').forEach(b => {
    setFilterStyle(b, b.dataset.region === region);
  });

  updateAll();
}

function doSearch() {
  searchKw = document.getElementById('search-input').value.trim();
  updateAll();
}

function isVisible(h) {
  return (activeRegion === '전체' || h.region === activeRegion) &&
         (!searchKw || h.name.includes(searchKw) || h.address.includes(searchKw));
}

// ── 핀 + 리스트 동시 업데이트 ──
function updateAll() {
  const bounds = new naver.maps.LatLngBounds();
  let cnt = 0;
  markers.forEach(m => {
    const show = isVisible(m.h);
    m.marker.setMap(show ? map : null);
    if (show) { bounds.extend(m.marker.getPosition()); cnt++; }
  });
  if (cnt > 0 && !bounds.isEmpty()) map.fitBounds(bounds, {padding:60});
  document.getElementById('visible-count').textContent = cnt + '개 병원';
  renderList();
}

function renderList() {
  const list = document.getElementById('hospital-list');
  list.innerHTML = '';
  let cnt = 0;

  HOSPITALS.forEach((h, i) => {
    if (!isVisible(h)) return;
    cnt++;
    const color = REGION_COLORS[h.region] || '#888';
    const div = document.createElement('div');
    div.className = 'hospital-item'; div.id = 'item-' + i;
    div.innerHTML = `
      <div class="h-row">
        <span class="h-tag" style="background:${color}">${h.region}</span>
        <span class="h-name">${h.name}</span>
      </div>
      <div class="h-addr">${h.address}</div>`;
    div.onclick = () => {
      const m = markers.find(m => m.idx === i);
      if (!m) return;
      closeSheet();
      map.setZoom(14, false);
      map.setCenter(m.marker.getPosition());
      showInfo(h, i, m.marker);
    };
    list.appendChild(div);
  });

  document.getElementById('sheet-count').textContent = cnt + '개 병원';
}

function svgPin(color) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="26" height="34" viewBox="0 0 26 34">
    <path d="M13 0C5.82 0 0 5.82 0 13c0 8 13 21 13 21S26 21 26 13C26 5.82 20.18 0 13 0z" fill="${color}"/>
    <circle cx="13" cy="13" r="6" fill="white" opacity="0.9"/>
  </svg>`;
  return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
}

function createAllMarkers() {
  HOSPITALS.forEach((h, i) => {
    if (!h.lat) return;
    const color = REGION_COLORS[h.region] || '#03C75A';
    const pos = new naver.maps.LatLng(h.lat, h.lng);
    const marker = new naver.maps.Marker({
      position: pos, map,
      icon: { url: svgPin(color), size: new naver.maps.Size(26,34), anchor: new naver.maps.Point(13,34) }
    });
    naver.maps.Event.addListener(marker, 'click', () => {
      closeSheet();
      showInfo(h, i, marker);
    });
    markers.push({ h, marker, idx: i });
  });
}

function showInfo(h, idx, marker) {
  const color = REGION_COLORS[h.region] || '#03C75A';
  infoWindow.setContent(`
    <div class="info-wrap">
      <span class="info-close" onclick="closeInfo()">✕</span>
      <span class="info-region" style="background:${color}">${h.region}</span>
      <div class="info-name">${h.name}</div>
      <div class="info-addr">${h.address}</div>
    </div>`);
  infoWindow.open(map, marker);
  if (activeItem) activeItem.classList.remove('active');
  const el = document.getElementById('item-' + idx);
  if (el) { el.classList.add('active'); el.scrollIntoView({block:'nearest',behavior:'smooth'}); activeItem = el; }
}

function closeInfo() {
  infoWindow.close();
  if (activeItem) { activeItem.classList.remove('active'); activeItem = null; }
}

function openSheet() {
  document.getElementById('bottom-sheet').classList.add('open');
  document.getElementById('overlay').classList.add('show');
}

function closeSheet() {
  if (window.innerWidth < 768) {
    document.getElementById('bottom-sheet').classList.remove('open');
    document.getElementById('overlay').classList.remove('show');
  }
}
</script>
